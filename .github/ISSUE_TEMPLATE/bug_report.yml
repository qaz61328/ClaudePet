name: Bug Report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect to happen?
      placeholder: "When I click X, Y happens instead of Z..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Launch ClaudePet
        2. Run a Claude Code command that triggers authorization
        3. ...
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15.4"
    validations:
      required: true
  - type: input
    id: claudepet-version
    attributes:
      label: ClaudePet version
      description: Shown in the status bar menu
      placeholder: "e.g. 0.2.6"
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      placeholder: "e.g. 1.0.33"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output, console logs, or screenshots
    validations:
      required: false
